name: Feature request
description: Propose a user-focused improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes: { label: Problem, description: What user problem should be solved? }
    validations: { required: true }
  - type: textarea
    id: solution
    attributes: { label: Proposed solution }
    validations: { required: true }
  - type: textarea
    id: alternatives
    attributes: { label: Alternatives and trade-offs }
  - type: checkboxes
    attributes:
      label: Security
      options:
        - label: This request contains no API keys, tokens, personal data, or private Firebase configuration.
          required: true
