name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: checkboxes
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and removed all secrets/personal data.
          required: true
  - type: input
    id: version
    attributes:
      label: App version / commit
      placeholder: v1.0.0 or commit SHA
    validations: { required: true }
  - type: dropdown
    id: device
    attributes:
      label: Environment
      options: [Physical device, Emulator]
    validations: { required: true }
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: "1. Open…\n2. Tap…\n3. Observe…"
    validations: { required: true }
  - type: textarea
    id: expected
    attributes: { label: Expected behavior }
    validations: { required: true }
  - type: textarea
    id: actual
    attributes: { label: Actual behavior and sanitized logs }
    validations: { required: true }
