name: Tagged release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
      - name: Validate required secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          for name in GOOGLE_SERVICES_JSON RELEASE_KEYSTORE_BASE64 RELEASE_STORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            test -n "${!name}" || { echo "Missing GitHub secret: $name"; exit 1; }
          done
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > release.jks
      - name: Build signed release APK
        env:
          RELEASE_STORE_FILE: release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew --no-daemon clean testReleaseUnitTest :app:assembleRelease
      - name: Prepare artifacts
        run: |
          cp app/build/outputs/apk/release/app-release.apk "LiveTranslate-Pro-${GITHUB_REF_NAME}.apk"
          sha256sum "LiveTranslate-Pro-${GITHUB_REF_NAME}.apk" > "LiveTranslate-Pro-${GITHUB_REF_NAME}.apk.sha256"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            LiveTranslate-Pro-${{ github.ref_name }}.apk
            LiveTranslate-Pro-${{ github.ref_name }}.apk.sha256
