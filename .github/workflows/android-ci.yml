name: Android CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Restore Firebase and stable Debug signing configuration
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
          DEBUG_KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json
          else
            echo "GOOGLE_SERVICES_JSON is not set; building the Firebase-safe offline variant."
          fi
          if [ -n "$DEBUG_KEYSTORE_BASE64" ]; then
            printf '%s' "$DEBUG_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/livetranslate-debug.p12"
          fi
      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4
      - name: Unit tests and Debug APK
        env:
          DEBUG_STORE_FILE: ${{ runner.temp }}/livetranslate-debug.p12
          DEBUG_STORE_PASSWORD: ${{ secrets.DEBUG_STORE_PASSWORD }}
          DEBUG_KEY_ALIAS: ${{ secrets.DEBUG_KEY_ALIAS }}
          DEBUG_KEY_PASSWORD: ${{ secrets.DEBUG_KEY_PASSWORD }}
        run: ./gradlew --no-daemon testDebugUnitTest :core:model:test :domain:test lintDebug :app:assembleDebug
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: LiveTranslate-Pro-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

  functions:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: functions/package-lock.json
      - run: npm ci
      - run: npm run build
